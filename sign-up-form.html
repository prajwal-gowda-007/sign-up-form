<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="sign-up-form.css">
</head>
<body>
    <div class="main">

        <div class="sidebar">
            <div class="heading-line">
                <img class="logo" src="./image/Black and White Illustrative Adventure Logo.png" alt="Tours Logo">
                <h1>Mountain Tours</h1>
            </div>

            <footer>Photo by <a href="https://unsplash.com/@damiendufourphotographie" target="_blank"> Damien dufour </a> on <a href="https://unsplash.com/" target="_blank">Unsplash</a></footer>
           
        </div>

        <div class="form-content">
            <p class="form-para">This is not a real online service! you know you need something <br>like this in your life to help you realize your deepest dreams. <br>
            Sign up now to get started.</p>
            <p class="form-para">You know you want to.</p>

            <form action="#" class="form-layout" id="form-layout">
                <h1>Let's do this!</h1>

                <div class="form-grid">

                    <div class="form-flex">
                        <label for="first-name">FIRST NAME</label>
                        <input id="first-name" type="text" name="first-name" required placeholder="Prajwal">
                    </div>

                    <div class="form-flex">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name" name="last-name" placeholder="[Optional]">
                    </div>

                    <div class="form-flex">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" required placeholder="abc123@gmail.com">
                    </div>

                    <div class="form-flex">
                        <label for="phone-number">PHONE NUMBER</label>
                        <input type="tel" id="phone-number" name="phone-number" required maxlength="10" placeholder="8889998888" pattern="[0-9]{10}">
                    </div>

                    <div class="form-flex">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password" required placeholder="At least 8 characters" minlength="8">
                    </div>

                    <div class="form-flex">
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm-password" name="confirm-password" required placeholder="Same as password">
                    </div>

                </div>
            </form>
            
            <button type="submit" form="form-layout">Create Account</button>
            <p>Already have an account? <a href="" style=" color:green; text-decoration: none;">Log in</a> </p>
        </div>
        
    </div>
</body>
</html>
