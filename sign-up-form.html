<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="sign-up-form.css">
</head>
<body>
    <div class="main">

        <div class="sidebar">
            <div class="heading-line">
                <img class="logo" src="./image/Black and White Illustrative Adventure Logo.png" alt="Tours Logo">
                <h1>Mountain Tours</h1>
            </div>

            <footer>Photo by <a href="https://unsplash.com/@damiendufourphotographie" target="_blank"> Damien dufour </a> on <a href="https://unsplash.com/" target="_blank">Unsplash</a></footer>
           
        </div>

        <div class="form-content">
            <p class="form-para">This is not a real online service! you know you need something <br>like this in your life to help you realize your deepest dreams. <br>
            Sign up now to get started.</p>
            <p class="form-para">You know you want to.</p>

            <form action="" class="form-layout">
                <h1>Let's do this!</h1>

                <div class="form-grid">

                    <div class="form-flex">
                        <label for="first-name">FIRST NAME</label>
                        <input type="text">
                    </div>

                    <div class="form-flex">
                        <label for="last-name">LAST NAME</label>
                        <input type="text">
                    </div>

                    <div class="form-flex">
                        <label for="email">EMAIL</label>
                        <input type="email">
                    </div>

                    <div class="form-flex">
                        <label for="phone-number">PHONE NUMBER</label>
                        <input type="number">
                    </div>

                    <div class="form-flex">
                        <label for="password">PASSWORD</label>
                        <input type="password">
                    </div>

                    <div class="form-flex">
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password">
                    </div>

                </div>
            </form>
            
            <button>Create Account</button>
            <p>Already have an account? <a href="" style=" color:green; text-decoration: none;">Log in</a> </p>
        </div>
        
    </div>
</body>
</html>
